<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORSU | Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --danger: #ef4444;
            --dark-bg: #0f172a;
            --dark-card: #1f2937;
            --border-color: rgba(148, 163, 184, 0.3);
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: var(--text-main);
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 24px;
            padding: 32px 28px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.5);
        }

        .logo-text {
            font-weight: 700;
            font-size: 20px;
        }

        .logo-subtext {
            font-size: 12px;
            color: var(--text-muted);
        }

        h1 {
            font-size: 22px;
            margin: 18px 0 8px;
        }

        p.subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 12px 12px 34px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: #020617;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.5);
            background: #020617;
        }

        .error {
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(239, 68, 68, 0.5);
            background: rgba(239, 68, 68, 0.12);
            color: #fecaca;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .role-info {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.5;
        }

        button[type="submit"] {
            margin-top: 8px;
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            box-shadow: 0 14px 30px rgba(79, 70, 229, 0.4);
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
        }

        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 35px rgba(79, 70, 229, 0.55);
        }

        button[type="submit"]:active {
            transform: translateY(0);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        }

        .hint {
            margin-top: 16px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-bolt"></i>
            </div>
            <div>
                <div class="logo-text">NORSU Smart Admin</div>
                <div class="logo-subtext">Secure access portal</div>
            </div>
        </div>

        <h1>Sign in to continue</h1>
        <p class="subtitle">Use your assigned admin or distributed admin account.</p>

        {% if error %}
            <div class="error">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input
                        id="id_username"
                        type="text"
                        name="username"
                        value="{{ username|default:'' }}"
                        required
                        autofocus
                        placeholder="Enter your username"
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input
                        id="id_password"
                        type="password"
                        name="password"
                        required
                        placeholder="Enter your password"
                    >
                </div>
                <div class="role-info">
                    Superusers are routed to the full admin panel.<br>
                    Regular staff accounts are routed to the staff-only panel.
                </div>
            </div>

            <button type="submit">
                <i class="fas fa-sign-in-alt"></i>
                <span>Sign in</span>
            </button>
        </form>

    </div>
</body>
</html>
