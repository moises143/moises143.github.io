services:
  - type: web
    name: norsu-admin
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT server.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: norsu-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: norsu-redis
          type: redis
          property: connectionString

databases:
  - name: norsu-db
    databaseName: norsu
    plan: free

  - name: norsu-redis
    type: redis
    plan: free
